<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Wiki Ninjago - Maîtres du Spinjitzu</title>
    <style>
        body { background-color: #0b0d0f; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        h1 { color: #ffd700; text-transform: uppercase; letter-spacing: 3px; }
        .container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 50px; }
        
        /* Style des boutons Ninja */
        .ninja-btn { 
            border: none; 
            padding: 20px 30px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s; 
            color: white; 
            text-transform: uppercase; 
            text-decoration: none; /* Enlève le soulignement des liens */
            display: inline-block; /* Pour que le bouton garde sa forme */
        }
        .ninja-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .kai { background: #d00000; border-bottom: 5px solid #800000; }
        .jay { background: #0077b6; border-bottom: 5px solid #00507d; }
        .cole { background: #333; border-bottom: 5px solid #000; }
        .zane { background: #e0e1dd; color: #333; border-bottom: 5px solid #999; }
        .lloyd { background: #38b000; border-bottom: 5px solid #2d8a00; }

        #info-box { margin-top: 40px; background: #1a1c20; border: 2px dashed #ffd700; padding: 20px; border-radius: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <h1>L'Encyclopédie des Ninjas</h1>
    <p>Clique sur un Maître du Spinjitzu pour ouvrir son dossier complet :</p>

    <div class="container">
        <a href="kai.html" class="ninja-btn kai">Kai</a>
        <a href="jay.html" class="ninja-btn jay">Jay</a>
        <a href="cole.html" class="ninja-btn cole">Cole</a>
        <a href="zane.html" class="ninja-btn zane">Zane</a>
        <a href="lloyd.html" class="ninja-btn lloyd">Lloyd</a>
    </div>

    <div id="info-box">
        <p>Astuce : Chaque bouton t'enverra vers la page secrète du ninja sélectionné.</p>
    </div>

</body>
</html>
